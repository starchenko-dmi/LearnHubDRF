name: Deploy LearnHub with Docker

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: fake-secret-key
          DEBUG: 'True'
        run: python manage.py test

  deploy:
    needs: test
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/star-dim/learnhub"
          strip_components: 1
        env:
          # Включаем строгую проверку ошибок
          STRICT_HOST_CHECKING: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /home/star-dim/learnhub
            docker compose down
            docker compose up -d --build
            # Проверяем, что контейнер backend запущен
            if ! docker compose ps --services --status running | grep -q backend; then
              echo "❌ ERROR: backend container failed to start!"
              exit 1
            fi
            echo "✅ Deployment successful"